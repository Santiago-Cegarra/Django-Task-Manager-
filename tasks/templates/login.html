{% extends 'base.html' %}

{% block content %}
<main class="container">
    <div class="row">
        <section class="col-md-4 offset-md-4 mt-5">
            <form action="/login/" method="POST" class="card card-body">
            {% csrf_token %}
            <h1 class="text-center">Log-In</h1>
                    <div class="mb3 mt-2">
                        <label for="username">Username:</label>
                        <input type="text" name="username"
                        id="username" class="form-control" placeholder="Write Your Username">
                    </div>
                    <div class="mb3 mt-2">
                        <label for="password">Password</label>
                        <input type="password" name="password"
                        id="password1" class="form-control" placeholder="Write Your password">
                    </div>
                    <button class="btn btn-dark mt-4">
                        Log-In
                    </button>
                <strong><br>{{error}}</strong>
            </form>
        </section>
    </div>
</main>

{% endblock %}
