{% extends 'base.html' %}
{% block content %}
<main class="container">
    <div class="row">
        <div class="col-md-4 offset-md-4 mt-5 py-5">
            <form action="/signup/" method="POST" class="card card-body">
                <h1 class="text-center">Sign-up</h1>
                {% csrf_token %}
                
                <div class="mb3 mt-2">
                    <label for="username">Username:</label>
                    <input type="text" name="username"
                    id="username" class="form-control" placeholder="Write Your Username">
                </div>
                <div class="mb3 mt-2">
                    <label for="password1">Password</label>
                    <input type="password" name="password1"
                    id="password1" class="form-control" placeholder="Write Your password">
                </div>
                <div class="mb3 mt-2">
                    <label for="password2">Confirm your Password</label>
                    <input type="password" name="password2"
                    id="password2" class="form-control" placeholder="Confirm your password">
                </div>

                <button class="btn btn-dark mt-5">
                    SignUp
                </button>
                <h3>
                    <strong><br>{{error}}</strong>
                </h3>
        </form>
        </div>
    </div>
</main>
{% endblock %}
